<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --accent: #1f6feb; --danger: #da3633; --success: #238636; --warning: #d29922; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 60%; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; }
        #tools { width: 40%; padding: 25px; background: #090c10; overflow-y: auto; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 12px; font-size: 1.1rem; color: #f0f6fc; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .uid-label { font-family: monospace; font-size: 0.7rem; color: #8b949e; display: block; margin-top: 4px; }
        .badge { font-size: 0.65rem; padding: 3px 7px; border-radius: 4px; background: var(--accent); color: white; margin-left: 8px; font-weight: bold; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #30363d; margin-right: 8px; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
        button { border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.75rem; margin: 2px; transition: opacity 0.2s; }
        button:hover { opacity: 0.8; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-action { background: #30363d; color: white; }
        .btn-kick { background: #f85149; color: white; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 6px; resize: none; font-family: inherit; font-size: 0.9rem; }
        #status-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; font-size: 1.2rem; }
        .msg-preview-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
        .msg-preview-item:hover { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div id="status-overlay">AUTHORIZING...</div>

<div id="sidebar">
    <div class="section"><h3>Pending Requests</h3><tr><tbody id="requestTable"></tbody></table></div>
    <div class="section"><h3>Network Members</h3><table><tbody id="userTable"></tbody><tr></div>
    <div class="section">
        <h3>Recent Messages (Admin Tools)</h3>
        <div id="messageList" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
</div>

<div id="tools">
    <h3>System Controls</h3>
    <div class="section">
        <p style="font-size:0.85rem; opacity:0.7; margin-bottom: 10px;">Maintenance Mode</p>
        <button id="maintBtn" style="width:100%; padding:12px;">Loading Status...</button>
    </div>
    <div class="section">
        <p style="font-size:0.85rem; opacity:0.7; margin-bottom: 10px;">Pinned Message</p>
        <div id="active-pin" style="font-size: 0.8rem; margin-bottom: 10px; color: var(--warning);">None</div>
        <button class="btn-danger" style="width:100%;" onclick="unpinMessage()">Remove Pin</button>
    </div>
    <div class="section">
        <p style="font-size:0.85rem; opacity:0.7; margin-bottom: 10px;">Global Announcement</p>
        <textarea id="ann-msg" rows="3" placeholder="Type message..."></textarea>
        <button class="btn-success" style="width:100%; margin-top:10px; padding: 10px;" onclick="sendAnn()">Broadcast Message</button>
    </div>
    <button class="btn-danger" style="width:100%; padding:12px; opacity:0.6;" onclick="wipeChat()">Wipe Chat History (Permanent)</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://pgdytywttdrqakczrprg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZHl0eXd0dGRycWFrY3pycHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzMzMjYsImV4cCI6MjA5MjEwOTMyNn0.Owa5xlrvrw0p0lJ1AEqIxnudvTyxSSjKqZgX48j2KQA";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let myUser = null;
let messageData = [];

// Fix JWT expiration by refreshing session
async function refreshSession() {
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error || !session) {
        await supabase.auth.signInAnonymously();
    }
}

async function checkAuth() {
    await refreshSession();
    let { data: { session } } = await supabase.auth.getSession();
    if (!session) {
        const { data } = await supabase.auth.signInAnonymously();
        session = data.session;
    }
    myUser = session.user;

    const { data: profile } = await supabase.from('allowed_users').select('*').eq('id', myUser.id).single();
    
    if (profile && profile.role === 'admin') {
        document.getElementById("status-overlay").style.display = "none";
        initDashboard();
    } else {
        document.body.innerHTML = "<h1 style='text-align:center; padding-top:50px; color:white;'>UNAUTHORIZED ACCESS</h1>";
    }
}

function initDashboard() {
    setupRealtime();
    loadMessages();
    loadMembers();
    syncSystemUI();
}

async function setupRealtime() {
    supabase.channel('db_changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'system_settings' }, () => syncSystemUI())
        .on('postgres_changes', { event: '*', schema: 'public', table: 'allowed_users' }, () => loadMembers())
        .on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, () => loadMessages())
        .subscribe();
}

async function syncSystemUI() {
    const { data: settings } = await supabase.from('system_settings').select('*');
    if(!settings) return;

    const maint = settings.find(s => s.key === 'maintenance')?.value?.enabled;
    const btn = document.getElementById("maintBtn");
    btn.innerText = maint ? "DISABLE MAINTENANCE" : "ENABLE MAINTENANCE";
    btn.className = maint ? "btn-success" : "btn-warning";

    const pin = settings.find(s => s.key === 'pin')?.value;
    const pinDiv = document.getElementById("active-pin");
    pinDiv.innerText = (pin && pin.msg) ? "Current: " + pin.msg : "None";
}

async function loadMembers() {
    const { data: users } = await supabase.from('allowed_users').select('*');
    const reqTable = document.getElementById("requestTable");
    const userTable = document.getElementById("userTable");
    reqTable.innerHTML = "";
    userTable.innerHTML = "";

    users?.forEach(u => {
        if (u.role === 'pending') {
            reqTable.innerHTML += `<tr><td><b>${u.username}</b><span class="uid-label">${u.id}</span></td>
                <td style="text-align:right"><button class="btn-success" onclick="approve('${u.id}')">Allow</button>
                <button class="btn-danger" onclick="decline('${u.id}')">Deny</button></td></tr>`;
        } else if (u.role !== 'declined' && u.role !== 'banned') {
            const isOnline = (Date.now() - (u.last_seen || 0)) < 60000;
            const isAdmin = u.role === 'admin';
            const isMe = u.id === myUser.id;
            
            userTable.innerHTML += `<tr><td><div class="status-dot ${isOnline ? 'online' : ''}"></div><b>${u.username}</b> ${isAdmin ? '<span class="badge">ADMIN</span>' : ''} ${isMe ? '(You)' : ''}<span class="uid-label">${u.id}</span></td>
                <td style="text-align:right">
                <button class="btn-action" onclick="renameMember('${u.id}', '${u.username}')">Rename</button>
                ${!isMe ? `<button class="btn-kick" onclick="kickUser('${u.id}', '${u.username}')">Kick</button>` : ''}
                ${!isAdmin && !isMe ? `<button class="btn-warning" onclick="makeAdmin('${u.id}')">Promote</button>` : ''}
                ${isAdmin && !isMe ? `<button class="btn-danger" onclick="demoteAdmin('${u.id}')">Demote</button>` : ''}
                ${!isMe ? `<button class="btn-danger" onclick="banUser('${u.id}', '${u.username}')">Ban</button>` : ''}</td></tr>`;
        }
    });
}

async function loadMessages() {
    const { data } = await supabase.from('messages').select('*').order('time', { ascending: false }).limit(20);
    messageData = data || [];
    const list = document.getElementById("messageList");
    list.innerHTML = "";
    messageData.forEach(m => {
        list.innerHTML += `<div class="msg-preview-item">
            <b>${m.name}:</b> ${m.msg.substring(0, 100)} ${m.msg.length > 100 ? '...' : ''}<br>
            <button class="btn-success" onclick="pinMsg('${m.id}')">Pin</button>
            <button class="btn-danger" onclick="deleteMsg('${m.id}')">Delete</button>
        </div>`;
    });
}

// --- FIXED ACTIONS ---

window.toggleMaint = async () => {
    const { data: existing } = await supabase.from('system_settings').select('value').eq('key', 'maintenance').single();
    const newStatus = !existing.value.enabled;
    await supabase.from('system_settings').upsert({ 
        key: 'maintenance', 
        value: { enabled: newStatus } 
    }, { onConflict: 'key' });
    syncSystemUI();
};

window.unpinMessage = async () => {
    await supabase.from('system_settings').upsert({ 
        key: 'pin', 
        value: { id: null, msg: null } 
    }, { onConflict: 'key' });
    syncSystemUI();
};

window.pinMsg = async (id) => {
    const msgObj = messageData.find(m => m.id == id);
    if(msgObj) {
        await supabase.from('system_settings').upsert({ 
            key: 'pin', 
            value: { id: id, msg: msgObj.msg, name: msgObj.name } 
        }, { onConflict: 'key' });
        syncSystemUI();
    }
};

// --- FIXED USER ACTIONS ---

window.approve = async (id) => { 
    await refreshSession();
    await supabase.from('allowed_users').update({ role: 'user' }).eq('id', id); 
    loadMembers();
};

window.decline = async (id) => { 
    await refreshSession();
    await supabase.from('allowed_users').delete().eq('id', id); 
    loadMembers();
};

window.deleteMsg = async (id) => { 
    if(confirm("Delete this message?")) {
        await refreshSession();
        await supabase.from('messages').delete().eq('id', id); 
        loadMessages();
    }
};

window.makeAdmin = async (id) => { 
    if(confirm("Promote to Admin?")) {
        await refreshSession();
        await supabase.from('allowed_users').update({ role: "admin" }).eq('id', id); 
        loadMembers();
    }
};

window.demoteAdmin = async (id) => { 
    if(confirm("Demote this Admin to User?")) {
        await refreshSession();
        await supabase.from('allowed_users').update({ role: "user" }).eq('id', id); 
        loadMembers();
    }
};

window.renameMember = async (id, old) => { 
    const n = prompt("New name for " + old + ":");
    if(n && n.trim()) {
        await refreshSession();
        // Update username in allowed_users
        await supabase.from('allowed_users').update({ username: n.trim() }).eq('id', id);
        // Also update all existing messages from this user to show new name
        await supabase.from('messages').update({ name: n.trim() }).eq('uid', id);
        loadMembers();
    }
};

window.kickUser = async (id, name) => {
    if(confirm("Kick " + name + "? They will need to re-request access.")) {
        await refreshSession();
        // Completely remove user
        await supabase.from('allowed_users').delete().eq('id', id);
        loadMembers();
    }
};

window.banUser = async (id, name) => {
    if(confirm("Ban " + name + " permanently? They will never access again.")) {
        await refreshSession();
        await supabase.from('allowed_users').update({ role: 'banned' }).eq('id', id);
        loadMembers();
    }
};

// --- FIXED ANNOUNCEMENT ---
window.sendAnn = async () => {
    const m = document.getElementById("ann-msg");
    const val = m.value.trim();
    if(!val) return;
    await refreshSession();
    await supabase.from('messages').insert([{ 
        uid: myUser.id,
        msg: val, 
        name: "🔔 SYSTEM", 
        type: "announcement", 
        time: new Date().toISOString(),
        is_announcement: true,
        seen_by: []
    }]);
    m.value = "";
    loadMessages();
    alert("Announcement Broadcasted!");
};

window.wipeChat = async () => {
    if(confirm("⚠️ PERMANENTLY wipe ALL messages? This cannot be undone!")) {
        await refreshSession();
        const { error } = await supabase.from('messages').delete().neq('id', '00000000-0000-0000-0000-000000000000');
        if(!error) {
            alert("Chat wiped.");
            loadMessages();
        } else {
            alert("Error: " + error.message);
        }
    }
};

// Refresh session periodically to prevent JWT expiration
setInterval(refreshSession, 300000); // Every 5 minutes

// Attach toggleMaint to button after DOM loads
document.addEventListener('DOMContentLoaded', () => {
    const maintBtn = document.getElementById("maintBtn");
    if(maintBtn) {
        maintBtn.onclick = window.toggleMaint;
    }
});

checkAuth();
</script>
</body>
</html>
