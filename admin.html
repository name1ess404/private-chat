<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --accent: #1f6feb; --danger: #da3633; --success: #238636; --warning: #d29922; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 60%; border-right: 1px solid var(--border); padding: 20px; overflow-y: auto; }
        #tools { width: 40%; padding: 20px; background: #090c10; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; }
        button { border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: bold; margin: 2px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        .btn-promote { background: #8957e5; color: white; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
<div id="sidebar">
    <div class="section"><h3>Member Requests</h3><table><tbody id="requestTable"></tbody></table></div>
    <div class="section"><h3>Chat Members</h3><table><tbody id="userTable"></tbody></table></div>
    <div class="section"><h3>Recent Messages (Pin)</h3><div id="messageList"></div></div>
</div>
<div id="tools">
    <div class="section"><h3>Settings</h3><button id="maintBtn" style="width:100%" onclick="toggleMaint()">...</button></div>
    <div class="section"><h3>Pin</h3><div id="active-pin" style="color:var(--warning)">None</div><button class="btn-danger" style="width:100%; margin-top:10px;" onclick="unpin()">Unpin</button></div>
    <div class="section"><h3>Announcement</h3><textarea id="ann-msg" style="width:100%; height:60px;"></textarea><button class="btn-success" style="width:100%; margin-top:10px;" onclick="sendAnn()">Send</button></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient("https://pgdytywttdrqakczrprg.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZHl0eXd0dGRycWFrY3pycHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzMzMjYsImV4cCI6MjA5MjEwOTMyNn0.Owa5xlrvrw0p0lJ1AEqIxnudvTyxSSjKqZgX48j2KQA");

let myId = null;

async function init() {
    const { data: { session } } = await supabase.auth.getSession();
    myId = session?.user.id;
    supabase.channel('admin_live').on('postgres_changes', { event: '*', schema: 'public' }, () => load()).subscribe();
    load();
}

async function load() {
    const { data: users } = await supabase.from('allowed_users').select('*');
    const { data: msgs } = await supabase.from('messages').select('*').order('time', { ascending: false }).limit(10);
    const { data: sett } = await supabase.from('system_settings').select('*');

    const ut = document.getElementById("userTable");
    const rt = document.getElementById("requestTable");
    ut.innerHTML = rt.innerHTML = "";

    users?.forEach(u => {
        const row = `<tr><td>${u.username}</td><td style="text-align:right">
            <button class="btn-warning" onclick="rename('${u.id}')">Rename</button>
            ${u.id !== myId ? `
                <button class="btn-danger" onclick="kick('${u.id}')">Kick</button>
                <button class="btn-promote" onclick="updateRole('${u.id}','admin')">Promote</button>
            ` : ''}
            ${u.role === 'pending' ? `<button class="btn-success" onclick="updateRole('${u.id}','user')">Allow</button>` : ''}
        </td></tr>`;
        if(u.role === 'pending') rt.innerHTML += row; else ut.innerHTML += row;
    });

    const ml = document.getElementById("messageList");
    ml.innerHTML = "";
    msgs?.forEach(m => {
        ml.innerHTML += `<div style="padding:5px; border-bottom:1px solid #333; font-size:0.8rem;">${m.name}: ${m.msg} <button onclick="pin('${m.id}','${m.msg.replace(/'/g,"")}')">Pin</button></div>`;
    });

    const mVal = sett.find(s => s.key === 'maintenance')?.value?.enabled;
    document.getElementById("maintBtn").innerText = mVal ? "Disable Maintenance" : "Enable Maintenance";
    document.getElementById("active-pin").innerText = sett.find(s => s.key === 'pin')?.value?.msg || "None";
}

window.updateRole = async (id, role) => await supabase.from('allowed_users').update({ role }).eq('id', id);
window.kick = async (id) => confirm("Kick?") && await supabase.from('allowed_users').delete().eq('id', id);
window.rename = async (id) => { const n = prompt("New Name:"); if(n) await supabase.from('allowed_users').update({ username: n }).eq('id', id); };
window.toggleMaint = async () => {
    const { data } = await supabase.from('system_settings').select('value').eq('key', 'maintenance').single();
    await supabase.from('system_settings').update({ value: { enabled: !data.value.enabled } }).eq('key', 'maintenance');
};
window.pin = async (id, msg) => await supabase.from('system_settings').update({ value: { id, msg } }).eq('key', 'pin');
window.unpin = async () => await supabase.from('system_settings').update({ value: { id: "", msg: "" } }).eq('key', 'pin');
window.sendAnn = async () => {
    const v = document.getElementById("ann-msg").value;
    await supabase.from('messages').insert([{ msg: v, name: "SYSTEM", type: "announcement", time: new Date().toISOString() }]);
};

init();
</script>
</body>
</html>
