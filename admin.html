<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --accent: #1f6feb; --danger: #da3633; --success: #238636; --warning: #d29922; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 60%; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; }
        #tools { width: 40%; padding: 25px; background: #090c10; overflow-y: auto; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 12px; font-size: 1.1rem; color: #f0f6fc; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .uid-label { font-family: monospace; font-size: 0.7rem; color: #8b949e; display: block; }
        .badge { font-size: 0.65rem; padding: 3px 7px; border-radius: 4px; background: var(--accent); color: white; margin-left: 8px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #30363d; margin-right: 8px; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
        button { border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.75rem; margin: 2px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 6px; }
        #status-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

<div id="status-overlay">AUTHORIZING...</div>

<div id="sidebar">
    <div class="section"><h3>Pending Requests</h3><table><tbody id="requestTable"></tbody></table></div>
    <div class="section"><h3>Network Members</h3><table><tbody id="userTable"></tbody></table></div>
    <div class="section"><h3>Banned Users</h3><table><tbody id="bannedTable"></tbody></table></div>
    <div class="section"><h3>Recent Messages</h3><div id="messageList" style="max-height: 300px; overflow-y: auto;"></div></div>
</div>

<div id="tools">
    <h3>System Controls</h3>
    <div class="section">
        <p>Maintenance Mode</p>
        <button id="maintBtn" style="width:100%;" onclick="toggleMaint()">Checking...</button>
    </div>
    <div class="section">
        <p>Pinned Message</p>
        <div id="active-pin" style="font-size: 0.8rem; margin-bottom: 10px; color: var(--warning);">None</div>
        <button class="btn-danger" style="width:100%;" onclick="unpinMessage()">Remove Pin</button>
    </div>
    <div class="section">
        <p>Announcement</p>
        <textarea id="ann-msg" rows="3" placeholder="Broadcast to all..."></textarea>
        <button class="btn-success" style="width:100%; margin-top:10px;" onclick="sendAnn()">Broadcast</button>
    </div>
    <button class="btn-danger" style="width:100%; opacity:0.6;" onclick="wipeChat()">Wipe Chat History</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SUPABASE_URL = "https://pgdytywttdrqakczrprg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZHl0eXd0dGRycWFrY3pycHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzMzMjYsImV4cCI6MjA5MjEwOTMyNn0.Owa5xlrvrw0p0lJ1AEqIxnudvTyxSSjKqZgX48j2KQA";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let myUser = null, messageData = [];

async function checkAuth() {
    let { data: { session } } = await supabase.auth.getSession();
    if (!session) { const { data } = await supabase.auth.signInAnonymously(); session = data.session; }
    myUser = session.user;
    const { data: profile } = await supabase.from('allowed_users').select('*').eq('id', myUser.id).single();
    if (profile?.role === 'admin') { document.getElementById("status-overlay").style.display = "none"; initDashboard(); }
    else { document.body.innerHTML = "<h1 style='color:white;text-align:center'>UNAUTHORIZED</h1>"; }
}

function initDashboard() {
    supabase.channel('admin_sync').on('postgres_changes', { event: '*', schema: 'public' }, () => { syncSystemUI(); loadMembers(); loadMessages(); }).subscribe();
    syncSystemUI(); loadMembers(); loadMessages();
}

async function syncSystemUI() {
    const { data: settings } = await supabase.from('system_settings').select('*');
    const maint = settings?.find(s => s.key === 'maintenance')?.value?.enabled;
    const btn = document.getElementById("maintBtn");
    btn.innerText = maint ? "DISABLE MAINTENANCE" : "ENABLE MAINTENANCE";
    btn.className = maint ? "btn-success" : "btn-warning";
    const pin = settings?.find(s => s.key === 'pin')?.value;
    document.getElementById("active-pin").innerText = pin?.msg ? "Current: " + pin.msg : "None";
}

async function loadMembers() {
    const { data: users } = await supabase.from('allowed_users').select('*');
    const reqT = document.getElementById("requestTable"), userT = document.getElementById("userTable"), banT = document.getElementById("bannedTable");
    reqT.innerHTML = ""; userT.innerHTML = ""; banT.innerHTML = "";

    users?.forEach(u => {
        const isOnline = (Date.now() - (u.last_seen || 0)) < 60000;
        const isAdmin = u.role === 'admin', isMe = u.id === myUser.id;

        if (u.role === 'pending') {
            reqT.innerHTML += `<tr><td><b>${u.username}</b></td><td style="text-align:right"><button class="btn-success" onclick="updateRole('${u.id}', 'user')">Allow</button><button class="btn-danger" onclick="kickUser('${u.id}')">Deny</button></td></tr>`;
        } else if (u.role === 'banned') {
            banT.innerHTML += `<tr><td><b>${u.username}</b></td><td style="text-align:right"><button class="btn-success" onclick="updateRole('${u.id}', 'user')">Unban</button></td></tr>`;
        } else {
            userT.innerHTML += `<tr><td><div class="status-dot ${isOnline ? 'online' : ''}"></div><b>${u.username}</b> ${isAdmin ? '<span class="badge">ADMIN</span>' : ''}</td>
                <td style="text-align:right">
                <button onclick="renameMember('${u.id}', '${u.username}')">Rename</button>
                ${!isMe ? `<button class="btn-danger" onclick="kickUser('${u.id}')">Kick</button><button class="btn-danger" onclick="updateRole('${u.id}', 'banned')">Ban</button>` : ''}
                ${!isAdmin ? `<button class="btn-warning" onclick="updateRole('${u.id}', 'admin')">Promote</button>` : `<button class="btn-danger" onclick="updateRole('${u.id}', 'user')" ${isMe ? 'disabled' : ''}>Demote</button>`}
                </td></tr>`;
        }
    });
}

async function loadMessages() {
    const { data } = await supabase.from('messages').select('*').order('time', { ascending: false }).limit(20);
    messageData = data || [];
    const list = document.getElementById("messageList");
    list.innerHTML = messageData.map(m => `<div style="padding:5px;border-bottom:1px solid #333"><b>${m.name}:</b> ${m.msg} <br><button class="btn-success" onclick="pinMsg('${m.id}')">Pin</button><button class="btn-danger" onclick="deleteMsg('${m.id}')">Del</button></div>`).join("");
}

window.toggleMaint = async () => {
    const { data } = await supabase.from('system_settings').select('value').eq('key', 'maintenance').single();
    await supabase.from('system_settings').update({ value: { enabled: !data.value.enabled } }).eq('key', 'maintenance');
};

window.pinMsg = async (id) => {
    const m = messageData.find(x => x.id == id);
    if(m) await supabase.from('system_settings').update({ value: { id: m.id, msg: m.msg } }).eq('key', 'pin');
};

window.unpinMessage = async () => { await supabase.from('system_settings').update({ value: { id: "", msg: "" } }).eq('key', 'pin'); };

window.renameMember = async (id, old) => {
    const n = prompt("New name:", old);
    if(n && n !== old) {
        await supabase.from('allowed_users').update({ username: n }).eq('id', id);
        await supabase.from('messages').update({ name: n }).eq('uid', id); // Sync chat history
        alert("User and history updated.");
    }
};

window.updateRole = async (id, role) => { await supabase.from('allowed_users').update({ role }).eq('id', id); };
window.kickUser = async (id) => { if(confirm("Kick user?")) await supabase.from('allowed_users').delete().eq('id', id); };
window.deleteMsg = async (id) => { await supabase.from('messages').delete().eq('id', id); };
window.sendAnn = async () => {
    const val = document.getElementById("ann-msg").value.trim();
    if(val) { await supabase.from('messages').insert([{ msg: val, name: "SYSTEM", type: "announcement", time: new Date().toISOString() }]); document.getElementById("ann-msg").value = ""; }
};
window.wipeChat = async () => { if(confirm("Wipe all?")) await supabase.from('messages').delete().neq('id', '00000000-0000-0000-0000-000000000000'); };

checkAuth();
</script>
</body>
</html>
