<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --border: #30363d; --accent: #1f6feb; --danger: #da3633; --success: #238636; --warning: #d29922; }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #sidebar { width: 60%; border-right: 1px solid var(--border); padding: 25px; overflow-y: auto; }
        #tools { width: 40%; padding: 25px; background: #090c10; overflow-y: auto; }
        .section { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 25px; }
        h3 { margin-top: 0; border-bottom: 1px solid var(--border); padding-bottom: 12px; font-size: 1.1rem; color: #f0f6fc; }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 14px 8px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .uid-label { font-family: monospace; font-size: 0.7rem; color: #8b949e; display: block; margin-top: 4px; }
        .badge { font-size: 0.65rem; padding: 3px 7px; border-radius: 4px; background: var(--accent); color: white; margin-left: 8px; font-weight: bold; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #30363d; margin-right: 8px; }
        .status-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
        button { border: none; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 0.75rem; margin: 2px; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-warning { background: var(--warning); color: white; }
        textarea { width: 100%; background: #000; color: #fff; border: 1px solid var(--border); padding: 12px; border-radius: 6px; }
        #status-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 100; font-weight: bold; }
        .msg-preview-item { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="status-overlay">AUTHORIZING...</div>

<div id="sidebar">
    <div class="section"><h3>Pending Requests</h3><table><tbody id="requestTable"></tbody></table></div>
    <div class="section"><h3>Network Members</h3><table><tbody id="userTable"></tbody></table></div>
    <div class="section"><h3>Recent Messages (Admin Tools)</h3><div id="messageList"></div></div>
</div>

<div id="tools">
    <h3>System Controls</h3>
    <div class="section">
        <p>Maintenance Mode</p>
        <button id="maintBtn" style="width:100%" onclick="toggleMaint()">Loading...</button>
    </div>
    <div class="section">
        <p>Pinned Message</p>
        <div id="active-pin" style="color:var(--warning); margin-bottom:10px;">None</div>
        <button class="btn-danger" style="width:100%" onclick="unpinMessage()">Remove Pin</button>
    </div>
    <div class="section">
        <p>Global Announcement</p>
        <textarea id="ann-msg" rows="3" placeholder="Message..."></textarea>
        <button class="btn-success" style="width:100%; margin-top:10px" onclick="sendAnn()">Broadcast</button>
    </div>
    <button class="btn-danger" style="width:100%; opacity:0.6" onclick="wipeChat()">Wipe Chat</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const SUPABASE_URL = "https://pgdytywttdrqakczrprg.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBnZHl0eXd0dGRycWFrY3pycHJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1MzMzMjYsImV4cCI6MjA5MjEwOTMyNn0.Owa5xlrvrw0p0lJ1AEqIxnudvTyxSSjKqZgX48j2KQA";
const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

let messageData = [];

async function checkAuth() {
    let { data: { session } } = await supabase.auth.getSession();
    if (!session) { const { data } = await supabase.auth.signInAnonymously(); session = data.session; }
    const { data: profile } = await supabase.from('allowed_users').select('*').eq('id', session.user.id).single();
    if (profile?.role === 'admin') { document.getElementById("status-overlay").style.display = "none"; loadAll(); setupRealtime(); }
    else { document.body.innerHTML = "<h1>UNAUTHORIZED</h1>"; }
}

async function loadAll() {
    loadMembers();
    loadMessages();
    syncSystemUI();
}

async function syncSystemUI() {
    const { data } = await supabase.from('system_settings').select('*');
    const maint = data?.find(s => s.key === 'maintenance')?.value?.enabled;
    const pin = data?.find(s => s.key === 'pin')?.value;
    const btn = document.getElementById("maintBtn");
    btn.innerText = maint ? "DISABLE MAINTENANCE" : "ENABLE MAINTENANCE";
    btn.className = maint ? "btn-success" : "btn-warning";
    document.getElementById("active-pin").innerText = pin?.msg || "None";
}

async function loadMembers() {
    const { data: users } = await supabase.from('allowed_users').select('*');
    const reqT = document.getElementById("requestTable"), userT = document.getElementById("userTable");
    reqT.innerHTML = ""; userT.innerHTML = "";
    const now = Date.now();
    users?.forEach(u => {
        if (u.role === 'pending') reqT.innerHTML += `<tr><td>${u.username}</td><td><button class="btn-success" onclick="approve('${u.id}')">Allow</button></td></tr>`;
        else {
            const isOnline = (now - Number(u.last_seen)) < 40000;
            userT.innerHTML += `<tr><td><div class="status-dot ${isOnline ? 'online' : ''}"></div>${u.username}</td><td>
                <button onclick="renameMember('${u.id}', '${u.username}')">Rename</button>
                <button class="btn-danger" onclick="kickUser('${u.id}', '${u.username}')">Kick</button>
                <button class="btn-danger" onclick="banUser('${u.id}', '${u.username}')">Ban</button></td></tr>`;
        }
    });
}

async function loadMessages() {
    const { data } = await supabase.from('messages').select('*').order('time', { ascending: false }).limit(10);
    messageData = data || [];
    document.getElementById("messageList").innerHTML = messageData.map(m => `<div class="msg-preview-item"><b>${m.name}:</b> ${m.msg} <button class="btn-success" onclick="pinMsg('${m.id}')">Pin</button></div>`).join("");
}

function setupRealtime() {
    supabase.channel('admin').on('postgres_changes', { event: '*', schema: 'public' }, () => loadAll()).subscribe();
}

window.toggleMaint = async () => {
    const { data } = await supabase.from('system_settings').select('value').eq('key', 'maintenance').single();
    await supabase.from('system_settings').update({ value: { enabled: !data.value.enabled } }).eq('key', 'maintenance');
};

window.pinMsg = async (id) => {
    const m = messageData.find(x => x.id == id);
    if(m) await supabase.from('system_settings').update({ value: { id: m.id, msg: m.msg } }).eq('key', 'pin');
};

window.unpinMessage = async () => { await supabase.from('system_settings').update({ value: { id: "", msg: "" } }).eq('key', 'pin'); };

window.sendAnn = async () => {
    const val = document.getElementById("ann-msg").value;
    if(!val) return;
    await supabase.from('messages').insert([{ msg: val, name: "SYSTEM", type: "announcement", time: new Date().toISOString() }]);
    document.getElementById("ann-msg").value = "";
};

window.kickUser = async (id, name) => { if(confirm("Kick " + name + "?")) await supabase.from('allowed_users').delete().eq('id', id); };
window.banUser = async (id, name) => { if(confirm("Ban " + name + "?")) await supabase.from('allowed_users').update({ role: 'banned' }).eq('id', id); };
window.renameMember = async (id, old) => { 
    const n = prompt("New name:", old);
    if(n) await supabase.from('allowed_users').update({ username: n }).eq('id', id);
};
window.approve = async (id) => { await supabase.from('allowed_users').update({ role: 'user' }).eq('id', id); };
window.wipeChat = async () => { if(confirm("Wipe?")) await supabase.from('messages').delete().neq('id', '0'); };

checkAuth();
</script>
</body>
</html>
