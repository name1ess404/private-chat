<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Site Maintenance</title>
  <style>
    /* reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .box {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    h1 {
      color: white;
      font-size: 2rem;
      font-weight: 500;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }

    p {
      color: #aaa;
      font-size: 1.1rem;
      line-height: 1.5;
      margin-bottom: 8px;
    }

    .small {
      color: #666;
      font-size: 0.85rem;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Site under maintenance</h1>
    <p>will soon be available</p>
    <div class="small">— thank you for your patience —</div>
  </div>
</body>
</html>
